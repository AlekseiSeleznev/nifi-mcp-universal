name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r gateway/requirements.txt
          python -m pip install pytest pytest-asyncio pytest-cov

      - name: Run tests with coverage gate
        shell: bash
        run: |
          cd gateway
          python -m pytest tests/ -v \
            --cov=gateway \
            --cov-branch \
            --cov-report=term-missing \
            --cov-fail-under=100

      - name: Cross-platform smoke checks (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          ./tools/ci-smoke.sh

      - name: Cross-platform smoke checks (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./tools/ci-smoke.ps1

      - name: MCP PowerShell smoke
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./tests/smoke/mcp-smoke.ps1

  fresh-install-smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Fresh install smoke (Linux runtime)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p .ci-bin
          cat > .ci-bin/codex <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          state_file="${RUNNER_TEMP:-/tmp}/nifi-codex-mcp.json"
          if [ "${1:-}" = "--version" ]; then
            echo "codex-cli 0.0.ci"
            exit 0
          fi
          if [ "${1:-}" != "mcp" ]; then
            exit 1
          fi
          sub="${2:-}"
          case "$sub" in
            add)
              name="${3:-}"
              shift 3
              url=""
              bearer=""
              while [ $# -gt 0 ]; do
                case "$1" in
                  --url)
                    url="${2:-}"
                    shift 2
                    ;;
                  --bearer-token-env-var)
                    bearer="${2:-}"
                    shift 2
                    ;;
                  *)
                    shift
                    ;;
                esac
              done
              printf '{"name":"%s","transport":{"type":"streamable_http","url":"%s","bearer_token_env_var":"%s"}}\n' "$name" "$url" "$bearer" > "$state_file"
              ;;
            remove)
              rm -f "$state_file"
              ;;
            get)
              [ -f "$state_file" ] || exit 1
              cat "$state_file"
              ;;
            list)
              if [ -f "$state_file" ]; then
                printf '[%s]\n' "$(cat "$state_file")"
              else
                echo '[]'
              fi
              ;;
            *)
              exit 1
              ;;
          esac
          EOF
          chmod +x .ci-bin/codex
          export PATH="$PWD/.ci-bin:$PATH"

          if command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1 && docker compose version >/dev/null 2>&1; then
            MCP_SETUP_CI=1 ./setup.sh
            PORT="${NIFI_MCP_PORT:-8085}"

            health_code=$(curl -sS -o /dev/null -w "%{http_code}" "http://localhost:${PORT}/health")
            [ "$health_code" = "200" ] || { echo "health endpoint failed: ${health_code}"; exit 1; }

            dashboard_code=$(curl -sS -o /dev/null -w "%{http_code}" "http://localhost:${PORT}/dashboard")
            [ "$dashboard_code" = "200" ] || { echo "dashboard endpoint failed: ${dashboard_code}"; exit 1; }

            mcp_code=$(curl -sS -o /dev/null -w "%{http_code}" -X POST "http://localhost:${PORT}/mcp")
            if [ "$mcp_code" = "000" ] || [ "$mcp_code" = "404" ]; then
              echo "mcp endpoint is not reachable: ${mcp_code}"
              exit 1
            fi

            codex mcp get nifi-universal --json >/dev/null

            docker compose down -v || true
          else
            echo "Docker unavailable on this runner; running static setup checks only"
            bash -n setup.sh
          fi

      - name: Fresh install smoke (Windows static checks)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./tools/ci-smoke.ps1
          if (-not (Test-Path "docker-compose.windows.yml")) { throw "docker-compose.windows.yml missing" }
          if (-not (Test-Path "install.ps1")) { throw "install.ps1 missing" }
          if (-not (Test-Path "uninstall.ps1")) { throw "uninstall.ps1 missing" }
