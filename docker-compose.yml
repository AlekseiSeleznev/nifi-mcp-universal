services:
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
      network: host
    image: nifi-mcp-gateway
    container_name: nifi-mcp-gateway
    network_mode: host
    volumes:
      - gw-data:/data
      - ./.env:/app/.env:ro
    env_file:
      - .env
    restart: unless-stopped

volumes:
  gw-data:
